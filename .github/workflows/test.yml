name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # fipsagents 0.12.0 is required but may not be on PyPI yet; once it is,
          # the editable install of the platform service alone will pull it in.
          pip install -e ".[dev,postgres]"

      - name: Run tests
        run: pytest -v
