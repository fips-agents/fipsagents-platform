apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fipsagents-platform.fullname" . }}
  labels:
    {{- include "fipsagents-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "fipsagents-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "fipsagents-platform.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: platform
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: {{ include "fipsagents-platform.fullname" . }}-config
          env:
            {{- if .Values.storage.databaseUrlSecretRef.name }}
            - name: PLATFORM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.storage.databaseUrlSecretRef.name }}
                  key: {{ .Values.storage.databaseUrlSecretRef.key }}
            {{- else if .Values.storage.databaseUrl }}
            - name: PLATFORM_DATABASE_URL
              value: {{ .Values.storage.databaseUrl | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.probes.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          {{- if and (eq .Values.storage.backend "sqlite") .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- if and (eq .Values.storage.backend "sqlite") .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "fipsagents-platform.fullname" . }}-data
      {{- end }}
